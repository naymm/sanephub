# Referência NGINX enterprise: reverse proxy, compressão, cabeçalhos de segurança,
# WebSockets/SSE (upgrade) e upstream para múltiplas réplicas da app estática ou API.
#
# Integração: copiar blocos relevantes para o vosso `sites-available` ou montar como
# `default.conf` num contentor `nginx` à frente de `web` + gateway Node.
#
# Brotli: a imagem `nginx:bookworm` não inclui módulo ngx_brotli por defeito; usar
# imagem custom ou CDN (Cloudflare) para Brotli. Aqui: gzip + cache de assets.

upstream sanephub_web {
    least_conn;
    server web:80;
    # server web2:80;
    keepalive 32;
}

upstream sanephub_sse {
    least_conn;
    server host.docker.internal:4000;
    keepalive 8;
}

server {
    listen 80;
    http2 on;
    server_name _;

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # CSP: ajustar a origens reais (Supabase, APIs).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https: wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    location /assets/ {
        proxy_pass http://sanephub_web;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /realtime {
        proxy_pass http://sanephub_sse;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        proxy_pass http://sanephub_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Rate limit na borda (exemplo): descomentar e afinar zonas no contexto http
    # limit_req_zone $binary_remote_addr zone=perip:10m rate=30r/s;
    # limit_req zone=perip burst=50 nodelay;
}
