# Configuração do projeto Supabase (local e deploy).
# Ver: https://supabase.com/docs/guides/functions/function-configuration

# A função create-user é chamada pelo frontend com o JWT do utilizador.
# Com verify_jwt = true, o Kong pode devolver 401 em alguns ambientes locais.
# Definir false aqui e validar Admin dentro da função.
[functions.create-user]
verify_jwt = false

# Igual ao create-user: em localhost o gateway pode devolver 401 mesmo com sessão válida.
# A função valida o Bearer com supabase.auth.getUser().
[functions.birthdays]
verify_jwt = false
