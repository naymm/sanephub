<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Sanep HUB</title>
    <meta name="description" content="ERP Intranet Corporativa do Grupo SANEP" />
    <meta name="author" content="Grupo SANEP" />
    <meta name="theme-color" content="#101828" />
    <!-- Garante que a origem pode usar Geolocation API (marcação de ponto / PWA). -->
    <meta http-equiv="Permissions-Policy" content="geolocation=(self)" />
    <!-- Web manifest: gerado em /manifest.webmanifest e ligado no <head> pelo vite-plugin-pwa no build -->
    <!-- Web App / iOS (Safari “Adicionar ao Ecrã Inicial”) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sanep Hub" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="apple-touch-icon" href="/icon_app.png" />
    <meta property="og:title" content="Sanep Hub — GRUPO SANEP" />
    <meta property="og:description" content="Sistema integrado de gestão empresarial" />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <!-- Splash imediato antes do bundle JS (mobile e desktop) -->
    <style>
      #sanep-static-splash {
        display: flex;
        position: fixed;
        inset: 0;
        z-index: 2147483646;
        box-sizing: border-box;
        margin: 0;
        align-items: center;
        justify-content: center;
        background: #101828;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="sanep-static-splash" aria-hidden="true">
      <img
        src="/logo-white.png"
        alt=""
        width="200"
        height="40"
        style="width: min(200px, 62vw); height: auto; object-fit: contain"
      />
    </div>
    <div id="root"></div>
    <!-- Remove SW legado antes do bundle (evita JS em cache que impede o arranque). -->
    <script>
      (function () {
        if (!('serviceWorker' in navigator)) return;
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (r) {
            r.unregister();
          });
        });
        if ('caches' in window) {
          caches.keys().then(function (keys) {
            keys.forEach(function (k) {
              caches.delete(k);
            });
          });
        }
      })();
    </script>
    <script>
      window.addEventListener('error', function (ev) {
        var splash = document.getElementById('sanep-static-splash');
        if (splash) splash.remove();
        var root = document.getElementById('root');
        if (!root || root.children.length) return;
        var msg = (ev && ev.message) ? String(ev.message) : 'Erro ao carregar a aplicação.';
        root.innerHTML =
          '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#101828;color:#e2e8f0;font-family:system-ui,sans-serif;text-align:center">' +
          '<div><p style="font-size:1rem;margin:0 0 8px">Não foi possível iniciar a aplicação.</p>' +
          '<p style="font-size:0.8rem;margin:0 0 12px;opacity:0.75;word-break:break-word;max-width:28rem">' +
          msg +
          '</p>' +
          '<p style="font-size:0.875rem;margin:0;opacity:0.85">Recarregue com Cmd+Shift+R (Mac) ou Ctrl+Shift+R. Em DevTools → Application, limpe «Storage» / service workers deste site.</p></div></div>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
